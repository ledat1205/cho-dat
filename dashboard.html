<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Flashcard Dashboard</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f5;
      padding: 20px;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
    }
    h1 {
      margin-bottom: 20px;
      color: #333;
    }
    .controls {
      margin-bottom: 20px;
      display: flex;
      gap: 10px;
    }
    button {
      padding: 10px 16px;
      background: #4CAF50;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
    }
    button:hover {
      background: #45a049;
    }
    .cards-container {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 12px;
    }
    .card {
      background: white;
      border-radius: 8px;
      padding: 16px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      cursor: pointer;
      min-height: 150px;
      display: flex;
      flex-direction: column;
      transition: all 0.3s ease;
    }
    .card:hover {
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.15);
      transform: translateY(-2px);
    }
    .card.flipped {
      background: #e8f5e9;
    }
    .card-word {
      font-size: 18px;
      font-weight: bold;
      color: #333;
      margin-bottom: 8px;
    }
    .card-content {
      flex: 1;
      color: #666;
      font-size: 13px;
      line-height: 1.5;
      display: none;
    }
    .card.flipped .card-content {
      display: block;
    }
    .card.flipped .card-word {
      display: none;
    }
    .card-hint {
      color: #999;
      font-size: 12px;
      margin-top: auto;
    }
    .card-actions {
      display: flex;
      gap: 6px;
      margin-top: 10px;
    }
    .card-actions button {
      flex: 1;
      padding: 6px 10px;
      font-size: 12px;
      background: #f44336;
    }
    .card-actions button:hover {
      background: #da190b;
    }
    .empty {
      text-align: center;
      padding: 40px;
      color: #999;
    }
    .empty a { color: #2196F3; }
    .btn-settings { background: #2196F3; }
    .btn-settings:hover { background: #1976D2; }
  </style>
</head>
<body>
  <div class="container">
    <h1>📚 Flashcard Review</h1>
    <div class="controls">
      <button onclick="loadFlashcards()">🔄 Refresh</button>
      <button class="btn-settings" onclick="openSettings()">⚙️ Settings</button>
      <span id="count"></span>
    </div>
    <div class="cards-container" id="cardsContainer"></div>
    <div class="empty" id="emptyState" style="display:none">No flashcards yet. Double-click words to add them!</div>
  </div>
  <script src="dashboard.js"></script>
</body>
</html>
