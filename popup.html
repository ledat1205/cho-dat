<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 300px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      padding: 16px;
      margin: 0;
    }
    h1 {
      font-size: 16px;
      margin: 0 0 12px 0;
    }
    button {
      width: 100%;
      padding: 8px;
      margin: 6px 0;
      background: #4CAF50;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
    }
    button:hover {
      background: #45a049;
    }
    .secondary {
      background: #2196F3;
    }
    .secondary:hover {
      background: #0b7dda;
    }
  </style>
</head>
<body>
  <h1>📚 Vocab Helper</h1>
  <p>Right-click any word or phrase to see its definition.</p>
  <button onclick="openDashboard()">📋 View Flashcards</button>
  <p style="font-size: 12px; color: #666; margin-top: 12px;">💡 Tip: Drag to select text, then right-click. Works on webpages and YouTube!</p>
  <script src="popup.js"></script>
</body>
</html>
